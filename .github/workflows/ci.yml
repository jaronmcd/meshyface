name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest

  gui-responsiveness:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Locate Chromium-compatible browser
        run: |
          command -v chromium || command -v chromium-browser || command -v google-chrome || command -v google-chrome-stable

      - name: Run GUI responsiveness benchmark
        run: scripts/run_gui_responsiveness_ci.sh

      - name: Upload GUI responsiveness result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gui-responsiveness-benchmark
          path: benchmarks/gui_responsiveness/results/ci-gui-responsiveness.json
          if-no-files-found: ignore
